<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTrade - Login</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <h1>📈 SmartTrade</h1>
            <p class="auth-subtitle">AI-Powered Portfolio Analyzer</p>

            <div id="error-msg" class="error-msg" style="display:none"></div>

            <div class="tab-buttons">
                <button onclick="showTab('login')" id="login-tab" class="tab-btn active">Login</button>
                <button onclick="showTab('register')" id="register-tab" class="tab-btn">Register</button>
            </div>

            <!-- Login Form -->
            <div id="login-form">
                <input type="text" id="login-username" placeholder="Username" class="input-field">
                <input type="password" id="login-password" placeholder="Password" class="input-field">
                <button onclick="login()" class="btn-primary">Login</button>
            </div>

            <!-- Register Form -->
            <div id="register-form" style="display:none">
                <input type="text" id="reg-username" placeholder="Username" class="input-field">
                <input type="email" id="reg-email" placeholder="Email" class="input-field">
                <input type="password" id="reg-password" placeholder="Password" class="input-field">
                <button onclick="register()" class="btn-primary">Register</button>
            </div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('login-tab').classList.toggle('active', tab === 'login');
            document.getElementById('register-tab').classList.toggle('active', tab === 'register');
        }

        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const res = await fetch('/api/accounts/login/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if (data.access) {
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);
                window.location.href = '/dashboard/';
            } else {
                showError('Invalid username or password');
            }
        }

        async function register() {
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const res = await fetch('/api/accounts/register/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, email, password})
            });
            const data = await res.json();
            if (data.id) {
                showError('Account created! Please login.', 'success');
                showTab('login');
            } else {
                showError(JSON.stringify(data));
            }
        }

        function showError(msg, type='error') {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            el.className = type === 'success' ? 'success-msg' : 'error-msg';
        }
    </script>
</body>
</html>
