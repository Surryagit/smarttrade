{% extends 'base.html' %}

{% block title %}Portfolio{% endblock %}

{% block content %}
<div class="page-header">
    <h2>My Portfolio 📊</h2>
    <p>Manage your stock holdings</p>
</div>

<!-- Add Stock Form -->
<div class="section">
    <h3>Add New Stock</h3>
    <div id="add-error" class="error-msg" style="display:none"></div>
    <div id="add-success" class="success-msg" style="display:none"></div>
    <div class="add-stock-form">
        <input type="text" id="symbol" placeholder="Symbol (e.g. AAPL)" class="input-field">
        <input type="text" id="name" placeholder="Company Name (e.g. Apple Inc.)" class="input-field">
        <input type="number" id="quantity" placeholder="Quantity" class="input-field">
        <input type="number" id="buy_price" placeholder="Buy Price ($)" class="input-field" step="0.01">
        <button class="btn-primary" onclick="addStock()">+ Add Stock</button>
    </div>
</div>

<!-- Stock List -->
<div class="section">
    <h3>Your Holdings</h3>
    <table class="stock-table">
        <thead>
            <tr>
                <th>Symbol</th>
                <th>Name</th>
                <th>Quantity</th>
                <th>Buy Price</th>
                <th>Total Invested</th>
                <th>Date Added</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="holdings-tbody">
            <tr><td colspan="7" style="text-align:center">Loading...</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
    const token = localStorage.getItem('access_token');
    if (!token) window.location.href = '/';

    const headers = {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
    };

    async function loadHoldings() {
        const res = await fetch('/api/portfolio/', {headers});
        const stocks = await res.json();
        const tbody = document.getElementById('holdings-tbody');
        tbody.innerHTML = '';

        if (stocks.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#888">No stocks yet. Add your first stock above!</td></tr>';
            return;
        }

        stocks.forEach(stock => {
            const date = new Date(stock.date_added).toLocaleDateString();
            tbody.innerHTML += `<tr>
                <td><strong>${stock.symbol}</strong></td>
                <td>${stock.name}</td>
                <td>${stock.quantity}</td>
                <td>$${parseFloat(stock.buy_price).toFixed(2)}</td>
                <td>$${stock.total_invested.toFixed(2)}</td>
                <td>${date}</td>
                <td><button class="btn-danger" onclick="deleteStock(${stock.id})">Delete</button></td>
            </tr>`;
        });
    }

    async function addStock() {
        const symbol = document.getElementById('symbol').value.toUpperCase().trim();
        const name = document.getElementById('name').value.trim();
        const quantity = document.getElementById('quantity').value;
        const buy_price = document.getElementById('buy_price').value;

        if (!symbol || !name || !quantity || !buy_price) {
            showMsg('add-error', 'Please fill in all fields');
            return;
        }

        const res = await fetch('/api/portfolio/', {
            method: 'POST',
            headers,
            body: JSON.stringify({symbol, name, quantity, buy_price})
        });

        const data = await res.json();

        if (data.id) {
            showMsg('add-success', `${symbol} added successfully!`, 'success');
            document.getElementById('symbol').value = '';
            document.getElementById('name').value = '';
            document.getElementById('quantity').value = '';
            document.getElementById('buy_price').value = '';
            loadHoldings();
        } else {
            showMsg('add-error', JSON.stringify(data));
        }
    }

    async function deleteStock(id) {
        if (!confirm('Are you sure you want to delete this stock?')) return;
        await fetch(`/api/portfolio/${id}/`, {
            method: 'DELETE',
            headers
        });
        loadHoldings();
    }

    function showMsg(id, msg, type='error') {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.style.display = 'block';
        el.className = type === 'success' ? 'success-msg' : 'error-msg';
        setTimeout(() => el.style.display = 'none', 3000);
    }

    loadHoldings();
</script>
{% endblock %}
